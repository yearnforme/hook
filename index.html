<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChiefKeefHook</title>
    <link rel="icon" type="image/png" href="https://chiefkeefhook.live/assets/300.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #000000;
            --bg-gradient: linear-gradient(135deg, #000000 0%, #1a1a1a 30%, #0a0a0a 70%, #000000 100%);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 0, 0, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 0, 0, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 0, 0, 0.2) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 620px;
            width: 100%;
            position: relative;
            z-index: 1;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 420px;
        }

        .hero-section {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            width: 100%;
            margin-bottom: 32px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 24px;
            border-radius: 12px;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
            letter-spacing: 2px;
            line-height: 1.1;
            text-transform: uppercase;
        }

        .subtagline {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 300;
            margin-bottom: 16px;
        }

        .preview-gif {
            width: 100%;
            max-width: 520px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: block;
        }

        .discord-btn {
            display: inline-block;
            transition: transform 0.2s ease, opacity 0.2s ease;
            margin-top: 16px;
        }
        .discord-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .discord-btn img {
            height: 44px;
            width: auto;
            display: block;
        }

        .footer {
            margin-top: auto;
            padding-top: 36px;
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 400;
            text-align: center;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2.25rem;
            }

            .container {
                padding: 36px 24px;
            }

            .logo-img {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-section">
            <img class="logo-img" src="https://chiefkeefhook.live/assets/300.png" alt="ChiefKeefHook">
            <h1 class="logo">ChiefKeefHook</h1>
            <p class="subtagline">#1 Free External</p>
            <img class="preview-gif" src="https://chiefkeefhook.live/assets/Preview1.gif" alt="Preview">
            <a class="discord-btn" href="https://discord.com/invite/GqpKGbMh8a" target="_blank" rel="noopener noreferrer" title="Join Discord">
                <img src="https://chiefkeefhook.live/assets/discord.png" alt="Join Discord">
            </a>
        </div>

        <div class="footer">
            <p>© 2026 ChiefKeefHook.</p>
        </div>
    </div>
</body>
</html>
